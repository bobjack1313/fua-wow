name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Run tests
        run: ./scripts/run-tests.sh

      - name: Prepare package
        run: |
          mkdir -p .release
          cp README.md FUA/README.md
          cp CHANGELOG.md FUA/CHANGELOG.md
          cp LICENSE FUA/LICENSE
          zip -r .release/FUA-${GITHUB_REF_NAME}.zip FUA \
            -x "*.DS_Store" \
            -x "__MACOSX/*"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: FUA-${{ github.ref_name }}
          path: .release/FUA-${{ github.ref_name }}.zip
