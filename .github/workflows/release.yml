name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Run tests
        run: ./scripts/run-tests.sh

      - name: Prepare package
        run: |
          mkdir -p .release
          cp README.md FUA/README.md
          cp CHANGELOG.md FUA/CHANGELOG.md
          cp LICENSE FUA/LICENSE
          zip -r .release/FUA-${GITHUB_REF_NAME}.zip FUA \
            -x "*.DS_Store" \
            -x "__MACOSX/*"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: FUA-${{ github.ref_name }}
          path: .release/FUA-${{ github.ref_name }}.zip

      - name: Read changelog
        id: changelog
        run: |
          {
            echo 'body<<EOF'
            cat CHANGELOG.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Upload to CurseForge
        uses: itsmeow/curseforge-upload@v3
        with:
          token: ${{ secrets.CF_API_KEY }}
          project_id: 1564580
          game_endpoint: wow
          file_path: .release/FUA-${{ github.ref_name }}.zip
          game_versions: "12.0.7,12.0.5"
          changelog: ${{ steps.changelog.outputs.body }}
          changelog_type: markdown
          release_type: release
